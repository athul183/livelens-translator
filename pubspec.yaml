name: livelens_translator
description: LiveLens Translator – Real-time camera OCR and translation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.0+2

  # ML Kit – Text Recognition & Translation
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_translation: ^0.11.1
  google_mlkit_language_id: ^0.11.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  path_provider: ^2.1.4
  flutter_tts: ^4.1.0
  share_plus: ^10.0.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  uuid: ^4.4.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
